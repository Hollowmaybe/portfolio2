<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Business Site</title>
<link rel="stylesheet" href="style.css">
</head>
<style>
body {font-family: Arial; margin:0;}
.hero {
  background:#111;
  color:white;
  text-align:center;
  padding:100px 20px;
}
.btn {
  background:#00c896;
  padding:12px 24px;
  color:white;
  text-decoration:none;
  display:inline-block;
  margin-top:20px;
}
.services {
  padding:60px;
  text-align:center;
}
.grid {
  display:flex;
  gap:20px;
  justify-content:center;
}
.card {
  padding:20px;
  border:1px solid #ddd;
  border-radius:10px;
}
.reviews {
  background:#f5f5f5;
  padding:60px;
  text-align:center;
}
.contact {
  padding:60px;
  text-align:center;
}
</style>
<body>

<header class="hero">
  <h1>We Build Modern Websites</h1>
  <p>Helping businesses grow online</p>
  <a href="#contact" class="btn">Get Started</a>
</header>

<section class="services">
  <h2>Services</h2>
  <div class="grid">
    <div class="card">Landing Pages</div>
    <div class="card">UI Design</div>
    <div class="card">SEO Optimization</div>
  </div>
</section>

<section class="reviews">
  <h2>Reviews</h2>
  <p>“Great service, fast delivery!”</p>
</section>

<section id="contact" class="contact">
  <h2>Contact</h2>
  <button>Contact Us</button>
</section>

</body>
</html>
