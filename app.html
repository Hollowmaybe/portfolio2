<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>SaaS App</title>
<link rel="stylesheet" href="style.css">
</head>
<style>
body {margin:0;font-family:Arial;text-align:center;}

.hero {
  background:#4f46e5;
  color:white;
  padding:100px 20px;
}

.features {
  display:flex;
  justify-content:center;
  gap:20px;
  padding:60px;
}

.pricing {
  display:flex;
  justify-content:center;
  gap:20px;
  padding:60px;
}

.card {
  padding:20px;
  border:1px solid #ddd;
  border-radius:10px;
}
</style>
<body>

<section class="hero">
  <h1>Task Manager App</h1>
  <p>Organize your life easily</p>
  <button>Try Free</button>
</section>

<section class="features">
  <div>Fast</div>
  <div>Secure</div>
  <div>Cloud Sync</div>
</section>

<section class="pricing">
  <div class="card">Free</div>
  <div class="card">Pro $9</div>
</section>

</body>
</html>
